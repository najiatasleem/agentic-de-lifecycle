apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-eda
  labels:
    app: agentic-eda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentic-eda
  template:
    metadata:
      labels:
        app: agentic-eda
    spec:
      containers:
      - name: agentic-eda
        image: <INTERNAL_REGISTRY>/agentic-de-lifecycle:latest
        ports:
        - containerPort: 8501
        env:
        - name: STREAMLIT_SERVER_PORT
          value: "8501"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agentic-eda-service
spec:
  selector:
    app: agentic-eda
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8501
  type: LoadBalancer
